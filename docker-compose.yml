services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  server:
    build: ./server
    restart: unless-stopped
    environment:
      - PORT=3000
      - CLIENT_URL=${CLIENT_URL:?Set CLIENT_URL in .env (e.g. https://yourdomain.com)}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      - redis

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  redis_data:
